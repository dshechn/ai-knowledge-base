name: Daily Knowledge Collect

on:
  schedule:
    - cron: '0 8 * * *' # UTC 08:00 = 北京时间 16:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    env:
      LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
      ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
      QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collection pipeline
        run: python pipeline/pipeline.py --sources github,rss --limit 10 --verbose

      - name: Validate articles
        run: |
          if ls knowledge/articles/*.json 1>/dev/null 2>&1; then
            python hooks/validate_json.py knowledge/articles/*.json
            python hooks/check_quality.py knowledge/articles/*.json
          else
            echo "No articles to validate"
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No new data, skipping commit."
          else
            ARTICLE_COUNT=$(git diff --cached --name-only | grep -c '\.json$' || true)
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "chore: collect ${ARTICLE_COUNT} articles on ${DATE}"
            git push
          fi
